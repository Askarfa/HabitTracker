<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HabitTracker – Привычки с удовольствием</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="HabitTracker.Client.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">Загрузка...</div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.dragDrop = {
            startDrag: function (habitId, sourceColumn, dotNetHelper) {
                const dragData = { id: habitId, source: sourceColumn };
                event.dataTransfer.setData("text/plain", JSON.stringify(dragData));
                event.dataTransfer.effectAllowed = "move";
                window.dotNetDragDrop = dotNetHelper;
            },
            drop: function (targetColumn, event) {
                event.preventDefault();
                const rawData = event.dataTransfer.getData("text/plain");
                if (!rawData) return;
                const data = JSON.parse(rawData);
                if (data.source === targetColumn) return;
                if (window.dotNetDragDrop) {
                    window.dotNetDragDrop.invokeMethodAsync('OnHabitMoved', data.id, data.source, targetColumn);
                }
            }
        };
    </script>
</body>
</html>
